name: Upgrade Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New release version (e.g., 2.9.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate version format
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version '${VERSION}' is not in x.y.z format"
            exit 1
          fi

      - name: Update revision in pom.xml
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          ./mvnw versions:set-property \
            -Dproperty=revision \
            -DnewVersion="$VERSION" \
            -DgenerateBackupPoms=false

      - name: Create branch, commit, and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          echo "Updating plugin version to ${VERSION} and creating PR..."
          BRANCH="upgrade-version-${VERSION}"
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pom.xml
          git commit -m "chore: upgrade version to ${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: upgrade version to ${VERSION}" \
            --body "Bumps \`revision\` in \`pom.xml\` to \`${VERSION}\`." \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH"