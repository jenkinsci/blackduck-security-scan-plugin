# Note: additional setup is required, see https://www.jenkins.io/redirect/continuous-delivery-of-plugins

name: cd
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run the workflow'
        required: true

permissions:
  checks: read
  contents: write

jobs:
  maven-cd:
    if: ${{ github.event.inputs.environment == 'release' }}
    uses: jenkins-infra/github-reusable-workflows/.github/workflows/maven-cd.yml@791f6a10b7e9084eb9d6742293df4a562a801a8d  # v1
    secrets:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}